# version: '3.8'

services:
  localstack:
      image: localstack/localstack:2.3.2
      container_name: localstack
      ports:
        - "4566:4566"
      environment:
        - SERVICES=s3,sqs,dynamodb,lambda
        - DEBUG=1
        - AWS_DEFAULT_REGION=us-east-1
        - LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT=1
      volumes:
        - "./localstack:/var/lib/localstack"
        - "/var/run/docker.sock:/var/run/docker.sock"
  mysql:
      image: mysql:8.0
      container_name: vms-mysql
      environment:
        MYSQL_ROOT_PASSWORD: 1234
        MYSQL_DATABASE: vms_db_01
      ports:
        - "3307:3306"
      volumes:
        - mysql_data:/var/lib/mysql
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
        interval: 10s
        timeout: 5s
        retries: 5

  kafka:
      image: apache/kafka:4.1.1
      container_name: vms-kafka

      ports:
        - "9092:9092"

      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: vms-zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vms-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vms_db_01
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  backend-invoice:
    build:
      context: ./backend-invoice
      dockerfile: Dockerfile
    container_name: vms-backend-invoice
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vms_db_01
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vms-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
      - backend-invoice

volumes:
  mysql_data: