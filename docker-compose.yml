version: '3.8'

services:
  localstack:
      image: localstack/localstack:2.3.2
      container_name: localstack
      ports:
        - "4566:4566"
      environment:
        - SERVICES=s3,sqs,dynamodb,lambda
        - DEBUG=1
        - AWS_DEFAULT_REGION=us-east-1
        - LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT=1
      volumes:
        - "./localstack:/var/lib/localstack"
        - "/var/run/docker.sock:/var/run/docker.sock"
  mysql:
      image: mysql:8.0
      container_name: vms-mysql
      environment:
        MYSQL_ROOT_PASSWORD: 1234
        MYSQL_DATABASE: vms_db_01
      ports:
        - "3307:3306"
      volumes:
        - mysql_data:/var/lib/mysql
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
        interval: 10s
        timeout: 5s
        retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vms-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vms_db_01
      SPRING_DATASOURCE_PASSWORD: 1234
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vms-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  mysql_data: