server:
  port: 8080

spring:
  application:
    name: vendor-management-system
  
  datasource:
    # url: jdbc:mysql://localhost:3306/vms_db_01
    # username: root
    # password: 1234
    
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/vms_db_01}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: invoice-service-group
      auto-offset-reset: earliest
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

invoice:
  topic: invoice-submitted

jwt:
  secret: VmVuZG9yTWFuYWdlbWVudFN5c3RlbUxlbmd0a0tleUZvclNlY3VyZUF1dGhlbnRpY2F0aW9u
  expiration: 86400000

logging:
  level:
    com.vms: DEBUG
    org.springframework.security: DEBUG


aws:
  endpoint: http://localstack:4566
  region: us-east-1
  access-key: test
  secret-key: test
  